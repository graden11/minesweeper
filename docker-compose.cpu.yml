services:
  mysql:
    image: mysql:8.0
    container_name: kama-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Gomoku
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  httpserver:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: kama-httpserver:cpu
    container_name: kama-httpserver
    ports:
      - "80:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
