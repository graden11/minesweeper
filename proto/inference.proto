syntax = "proto3";

package inference;

service ImageInference {
    rpc Predict(PredictRequest) returns (PredictResponse);
}

message PredictRequest {
    bytes  image_data = 1;
    string model_name = 2;
}

// Classification result (unchanged)
message Prediction {
    int32  class_id   = 1;
    string label      = 2;
    float  confidence = 3;
}

// Detection result
message BBox {
    float x1 = 1;
    float y1 = 2;
    float x2 = 3;
    float y2 = 4;
}

message DetectionResult {
    int32  class_id   = 1;
    string label      = 2;
    float  confidence = 3;
    BBox   bbox       = 4;
}

// Segmentation result
message SegmentationData {
    bytes  mask_data   = 1;
    int32  height      = 2;
    int32  width       = 3;
    int32  num_classes = 4;
}

message PredictResponse {
    bool                 success      = 1;
    string               message      = 2;
    string               task_type    = 3;
    repeated Prediction  predictions  = 4;      // classification
    repeated DetectionResult detections = 5;     // detection
    SegmentationData      segmentation = 6;      // segmentation
}
